# ZMK west manifest — pinned to v0.3 (stable, pre-Zephyr 4.1)
# Stay on v0.3 until ZMK cuts v0.4 with the Zephyr 4.1 migration fully stable.
# To upgrade later: change revision to the new tag and update board name in build.yaml.
manifest:
  remotes:
    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware
  projects:
    - name: zmk
      remote: zmkfirmware
      revision: v0.3
      import: app/west.yml
  self:
    path: config
