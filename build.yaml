---
include:
  # nice_nano//zmk = nice_nano v2 with ZMK variant (Zephyr 4.1+)
  # The // shorthand means "single SoC, skip the SoC field" = nice_nano/nrf52840/zmk
  # nice_nano now defaults to v2.0.0; use nice_nano@1.0.0//zmk for v1
  # See: https://zmk.dev/blog/2025/12/09/zephyr-4-1
  - board: nice_nano//zmk
    shield: page_turner
