name: Build ZMK firmware

on:
  push:
    paths:
      - 'config/**'
      - 'boards/**'
      - 'build.yaml'
      - '.github/workflows/build.yml'
  pull_request:
    paths:
      - 'config/**'
      - 'boards/**'
      - 'build.yaml'
      - '.github/workflows/build.yml'
  workflow_dispatch:   # Manual trigger from GitHub UI

jobs:
  build:
    # Pin workflow to v0.3 to match firmware version in config/west.yml.
    # The @main workflow uses new Zephyr 4.1 board metadata (qualifiers) that
    # nice_nano_v2 doesn't have, causing a KeyError crash after a successful build.
    # When upgrading firmware to v0.4+, change both this and west.yml together.
    uses: zmkfirmware/zmk/.github/workflows/build-user-config.yml@v0.3
