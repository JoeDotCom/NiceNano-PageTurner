name: Build ZMK firmware

on:
  push:
    paths:
      - 'config/**'
      - 'boards/**'
      - 'build.yaml'
      - '.github/workflows/build.yml'
  pull_request:
    paths:
      - 'config/**'
      - 'boards/**'
      - 'build.yaml'
      - '.github/workflows/build.yml'
  workflow_dispatch:   # Manual trigger from GitHub UI

jobs:
  build:
    uses: zmkfirmware/zmk/.github/workflows/build-user-config.yml@main
