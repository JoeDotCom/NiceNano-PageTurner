# ── Page Turner shield config ──────────────────────────────────────────────

# EC11 rotary encoders
CONFIG_EC11=y
# OWN_THREAD gives the encoder its own processing thread so pulses are never
# queued behind BLE events. Fixes the ~10% missed-turn rate seen with GLOBAL_THREAD.
CONFIG_EC11_TRIGGER_OWN_THREAD=y

# Longer debounce for breadboard wiring (loose connections are noisier)
# Reduce to 5 once you're on a proper PCB
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=10
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=10

# ── BLE keep-alive ─────────────────────────────────────────────────────────
# ZMK's default idle timeout is 30 s. When it fires it renegotiates BLE
# connection parameters (longer interval to save power). The Kobo's BLE
# stack doesn't handle that mid-session renegotiation gracefully and drops
# the link — which is the ~30 s disconnect you were seeing.
# Setting to 1 hour effectively disables idle for a reading session.
CONFIG_ZMK_IDLE_TIMEOUT=3600000
# Disable deep sleep entirely — device should stay paired and responsive.
CONFIG_ZMK_SLEEP=n

# ── Profile-switch LED feedback ────────────────────────────────────────────
# Enables &bl BL_ON / &bl BL_OFF in macros (see keymap).
# The LED node itself is declared in page_turner.overlay.
CONFIG_ZMK_BACKLIGHT=y
CONFIG_ZMK_BACKLIGHT_BRT_START=100        # full brightness when on
CONFIG_ZMK_BACKLIGHT_AUTO_OFF_IDLE=n      # don't auto-kill the LED on idle
